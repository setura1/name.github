<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Pro_Speed_Vocab_Final</title>
<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  margin:0; width:100%; height:100%;
  background:#f0f4f8;
  font-family:sans-serif;
  color:#334155;
}
body{ overflow:hidden; }
#setup, #report{
  position:fixed; inset:0; background:#f0f4f8;
  padding:16px; z-index:10; overflow:auto; display:none;
}
#setup{ display:block; }
.container{
  max-width:600px; margin:0 auto; background:#fff;
  border-radius:24px; padding:24px; box-shadow:0 10px 25px rgba(0,0,0,0.05);
}
textarea,input,button{
  width:100%; font-size:16px; border-radius:14px; border:1px solid #e2e8f0;
}
textarea,input{ padding:14px; background:#f8fafc; }
textarea{ min-height:150px; font-family:monospace; }
button{
  min-height:54px; font-weight:800; cursor:pointer; border:none;
  transition:all 0.1s ease; display:flex; align-items:center; justify-content:center;
}
button:active{ transform:scale(0.95); filter:brightness(0.9); }
#startBtn{ background:#2563eb; color:#fff; margin-top:12px; }
#retryMissedBtn{ background:#fff; color:#ef4444; border:2px solid #ef4444; margin-top:10px; display:none; }
.row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px; }
.label{ font-size:12px; font-weight:700; color:#64748b; margin:14px 0 6px 4px; }
#app{
  width:100%; height:100%; display:flex; flex-direction:column;
  padding:max(15px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)) 16px;
}
#progressText{ font-size:14px; font-weight:800; text-align:center; color:#64748b; margin-bottom:8px; }
#progressBarWrap{ width:100%; height:8px; background:#e2e8f0; border-radius:10px; overflow:hidden; }
#progressBar{ width:0%; height:100%; background:#2563eb; transition:width .3s ease; }
#card{
  flex:1 1 auto; background:#fff; border-radius:32px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; margin:15px 0; box-shadow:0 4px 15px rgba(0,0,0,0.03);
  position:relative; overflow:hidden;
}
/* カウントダウンゲージ */
#gaugeWrap{ position:absolute; bottom:0; left:0; width:100%; height:6px; background:#eee; }
#gauge{ width:100%; height:100%; background:#ef4444; transform-origin:left; }

#englishWord{ font-size:38px; font-weight:900; color:#0f172a; }
#japaneseWord{ margin-top:18px; font-size:26px; color:#2563eb; min-height:1.2em; font-weight:600; }
#buttons{ flex:0 0 auto; display:grid; grid-template-columns:1fr 0.6fr 1fr; gap:25px; }
#correctBtn{ background:#22c55e; color:#fff; }
#wrongBtn{ background:#ef4444; color:#fff; }
#againBtn{ background:#fff; border:2px solid #e2e8f0; font-size:14px; color:#64748b; }
#correctBtn,#wrongBtn,#againBtn{ min-height:88px; font-size:22px; border-radius:24px; }
@media (max-width:480px){
  #buttons{ grid-template-columns:1fr; gap:12px; }
  #correctBtn{ order: 1; } #againBtn{ order: 2; min-height:44px; } #wrongBtn{ order: 3; }
  #englishWord{ font-size:30px; }
}
</style>
</head>
<body>

<div id="setup">
  <div class="container">
    <div style="font-size:20px;font-weight:900;text-align:center;margin-bottom:15px;">オート修行修行 V4</div>
    
    <div class="label">クイック追加</div>
    <div class="row">
      <input type="text" id="addEn" placeholder="apple" autocomplete="off">
      <input type="text" id="addJa" placeholder="りんご" autocomplete="off">
    </div>
    <button id="addSingleBtn" style="margin-top:8px; min-height:44px; font-size:14px; background:#e2e8f0;">追加して保存</button>
    
    <div class="label">全体リスト (自動保存)</div>
    <textarea id="importArea"></textarea>
    
    <div class="row">
      <div>
        <div class="label">音声速度</div>
        <input type="number" id="rateAll" value="1.4" step="0.1">
      </div>
      <div>
        <div class="label">制限時間(ms)</div>
        <input type="number" id="answerLimit" value="1000" step="100">
      </div>
    </div>
    <button id="startBtn">学習開始</button>
    <button id="retryMissedBtn">前回のミス単語だけで開始</button>
  </div>
</div>

<div id="report">
  <div class="container">
    <div style="font-size:20px;font-weight:900;text-align:center;">結果レポート</div>
    <div id="scoreSummary" style="text-align:center; font-size:18px; margin:15px 0; font-weight:800;"></div>
    <div class="label">ミスリスト</div>
    <textarea id="copyArea" readonly></textarea>
    <button id="copyBtn" style="background:#22c55e; color:#fff; margin-bottom:10px;">コピー</button>
    <button id="backToSetupBtn">戻る</button>
  </div>
</div>

<div id="app">
  <div id="progressText">0 / 0</div>
  <div id="progressBarWrap"><div id="progressBar"></div></div>
  <div id="card">
    <div id="wordWrap">
      <div id="englishWord">Ready</div>
      <div id="japaneseWord"></div>
    </div>
    <div id="gaugeWrap"><div id="gauge"></div></div>
  </div>
  <div id="buttons">
    <button id="correctBtn">わかる</button>
    <button id="againBtn">再送</button>
    <button id="wrongBtn">苦手</button>
  </div>
</div>

<script>
const importArea = document.getElementById("importArea");
const addEn = document.getElementById("addEn");
const addJa = document.getElementById("addJa");
const rateInput = document.getElementById("rateAll");
const setup = document.getElementById("setup");
const report = document.getElementById("report");
const englishWordEl = document.getElementById("englishWord");
const japaneseWordEl = document.getElementById("japaneseWord");
const progressBarEl = document.getElementById("progressBar");
const progressTextEl = document.getElementById("progressText");
const gaugeEl = document.getElementById("gauge");
const copyArea = document.getElementById("copyArea");
const retryMissedBtn = document.getElementById("retryMissedBtn");

let queue = [], results = [], current = null, timer = null, running = false, accepting = false;
let missedWords = [];

// 音声合成（ピコーン/ブブー）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  if(type === 'ok') {
    osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
  } else {
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }
}

window.onload = () => {
  importArea.value = localStorage.getItem("vocab_data") || "apple,りんご\nengineer,技術者";
};

importArea.addEventListener("input", () => {
  localStorage.setItem("vocab_data", importArea.value);
});

function speak(text, lang) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = Number(rateInput.value) || 1.4;
    u.onend = resolve;
    speechSynthesis.speak(u);
  });
}

async function playSequence() {
  if(!current) return;
  speechSynthesis.cancel();
  accepting = false;
  
  // ゲージリセット
  gaugeEl.style.transition = 'none';
  gaugeEl.style.width = '100%';

  englishWordEl.textContent = current.en;
  japaneseWordEl.textContent = "";
  await speak(current.en, "en-US");
  
  await new Promise(r => setTimeout(r, 100));
  japaneseWordEl.textContent = current.ja;
  await speak(current.ja, "ja-JP");
  
  // 制限時間の開始
  accepting = true;
  const ms = Number(document.getElementById("answerLimit").value) || 1000;
  
  // ゲージのアニメーション
  gaugeEl.style.transition = `width ${ms}ms linear`;
  gaugeEl.style.width = '0%';
  
  clearTimeout(timer);
  timer = setTimeout(() => {
    if(accepting) submit("×");
  }, ms);
}

function next() {
  if(queue.length === 0) { showReport(); return; }
  current = queue.pop();
  updateUI();
  playSequence();
}

function submit(mark) {
  if(!running || !accepting) return;
  clearTimeout(timer);
  accepting = false;
  
  if(mark === '○') playSound('ok');
  else playSound('ng');

  results.push({ ...current, mark });
  setTimeout(next, 150);
}

function updateUI() {
  const total = results.length + queue.length + 1;
  const done = results.length;
  progressTextEl.textContent = `${done + 1} / ${total}`;
  progressBarEl.style.width = `${(done / total) * 100}%`;
}

function showReport() {
  running = false;
  report.style.display = "block";
  const missed = results.filter(v => v.mark === "×");
  missedWords = missed; 
  if(missed.length > 0) retryMissedBtn.style.display = "block";
  
  document.getElementById("scoreSummary").textContent = `正解: ${results.length - missed.length} / ${results.length}`;
  copyArea.value = missed.map(v => `${v.en},${v.ja}`).join("\n");
}

document.getElementById("addSingleBtn").addEventListener("click", () => {
  if(!addEn.value || !addJa.value) return;
  importArea.value += (importArea.value.trim() ? "\n" : "") + `${addEn.value},${addJa.value}`;
  addEn.value = ""; addJa.value = ""; addEn.focus();
  localStorage.setItem("vocab_data", importArea.value);
});

function startLearning(list) {
  if(!list.length) return;
  queue = list.sort(() => Math.random() - 0.5);
  results = []; running = true;
  setup.style.display = "none";
  report.style.display = "none";
  next();
}

document.getElementById("startBtn").addEventListener("click", () => {
  const list = importArea.value.split("\n").filter(v => v.includes(",")).map(line => {
    const p = line.split(","); return { en: p[0].trim(), ja: p[1].trim() };
  });
  startLearning(list);
});

retryMissedBtn.addEventListener("click", () => {
  startLearning([...missedWords]);
});

document.getElementById("copyBtn").addEventListener("click", () => {
  copyArea.select(); document.execCommand("copy");
});

document.getElementById("backToSetupBtn").addEventListener("click", () => {
  report.style.display = "none"; setup.style.display = "block";
});

document.getElementById("correctBtn").addEventListener("click", () => submit("○"));
document.getElementById("wrongBtn").addEventListener("click", () => submit("×"));
document.getElementById("againBtn").addEventListener("click", () => { if(running) playSequence(); });

document.addEventListener("touchstart", (e) => {
  if(e.touches.length === 2) location.reload();
}, { passive: true });
</script>
</body>
</html>
