<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>simple_touch_vocab.html</title>
<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#f5f7fb;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI",sans-serif;
}
body{
  overflow:hidden;
}
#setup{
  position:fixed;
  inset:0;
  background:#f5f7fb;
  padding:12px;
  z-index:10;
  overflow:auto;
}
#setupInner{
  max-width:900px;
  margin:0 auto;
  background:#fff;
  border:1px solid #d7deea;
  border-radius:16px;
  padding:12px;
}
textarea,input,select,button{
  width:100%;
  font-size:16px;
  border-radius:12px;
}
textarea,input,select{
  border:1px solid #d7deea;
  padding:12px;
  background:#fff;
}
textarea{
  min-height:220px;
  resize:vertical;
  line-height:1.5;
}
button{
  min-height:54px;
  border:1px solid #d7deea;
  background:#fff;
  font-weight:900;
}
#startBtn{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}
.small{
  font-size:12px;
  color:#667085;
  margin:6px 0 4px;
}
#app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  padding:
    max(10px, env(safe-area-inset-top))
    10px
    max(12px, env(safe-area-inset-bottom))
    10px;
}
#card{
  flex:1 1 auto;
  background:#fff;
  border:2px solid #d7deea;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}
#word{
  font-size:34px;
  line-height:1.35;
  font-weight:900;
  word-break:break-word;
  overflow-wrap:anywhere;
}
#buttons{
  flex:0 0 auto;
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}
#wrongBtn,#againBtn,#correctBtn{
  min-height:78px;
  font-size:22px;
  border-radius:18px;
}
#correctBtn{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}
#result{
  margin-top:10px;
  width:100%;
  min-height:120px;
}
@media (max-width:480px){
  #word{
    font-size:28px;
  }
  #buttons{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div id="setup">
  <div id="setupInner">
    <div style="font-size:20px;font-weight:900;">英単語カード</div>

    <div class="small">単語リスト</div>
    <textarea id="importArea">apple,りんご
engineer,技術者
design,設計
analysis,分析
system,システム</textarea>

    <div class="small">回答制限(ms)</div>
    <input type="number" id="answerLimit" value="1500" min="100" step="100">

    <div class="small">英語速度</div>
    <input type="number" id="rateEn" value="1.2" step="0.1">

    <div class="small">日本語速度</div>
    <input type="number" id="rateJa" value="1.1" step="0.1">

    <div class="small">日本語も読む</div>
    <select id="speakJapanese">
      <option value="yes" selected>yes</option>
      <option value="no">no</option>
    </select>

    <div class="row">
      <button id="startBtn">開始</button>
      <button id="closeSetupBtn">閉じる</button>
    </div>

    <div class="small">結果</div>
    <textarea id="result" readonly></textarea>
  </div>
</div>

<div id="app">
  <div id="card">
    <div id="word">---</div>
  </div>

  <div id="buttons">
    <button id="wrongBtn">わからない</button>
    <button id="againBtn">さいこう</button>
    <button id="correctBtn">わかる</button>
  </div>
</div>

<script>
const importArea = document.getElementById("importArea");
const answerLimitInput = document.getElementById("answerLimit");
const rateEnInput = document.getElementById("rateEn");
const rateJaInput = document.getElementById("rateJa");
const speakJapaneseSelect = document.getElementById("speakJapanese");
const startBtn = document.getElementById("startBtn");
const closeSetupBtn = document.getElementById("closeSetupBtn");
const setup = document.getElementById("setup");

const wordEl = document.getElementById("word");
const wrongBtn = document.getElementById("wrongBtn");
const againBtn = document.getElementById("againBtn");
const correctBtn = document.getElementById("correctBtn");
const resultEl = document.getElementById("result");

let words = [];
let queue = [];
let current = null;
let results = [];
let voices = [];
let timer = null;
let running = false;
let accepting = false;
let answered = false;
let startTime = null;
let endTime = null;

function parseWords(text){
  return text
    .split(/\r?\n/)
    .map(v => v.trim())
    .filter(Boolean)
    .map(line => {
      const parts = line.includes("\t") ? line.split("\t") : line.split(",");
      return {
        en:(parts[0] || "").trim(),
        ja:parts.slice(1).join(",").trim()
      };
    })
    .filter(v => v.en && v.ja);
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function speak(text, lang, rate){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = Number(rate) || 1.0;
  speechSynthesis.speak(u);
}

function unlockAudio(){
  try{
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    speechSynthesis.speak(u);
    speechSynthesis.cancel();
  }catch(e){}
}

function showWord(){
  if(!current){
    wordEl.textContent = "---";
    return;
  }
  wordEl.textContent = current.en;
}

function readWord(){
  if(!current) return;
  speechSynthesis.cancel();
  speak(current.en, "en-US", rateEnInput.value);
  if(speakJapaneseSelect.value === "yes"){
    setTimeout(() => {
      if(current) speak(current.ja, "ja-JP", rateJaInput.value);
    }, 450);
  }
}

function startTimer(){
  clearTimeout(timer);
  const ms = Number(answerLimitInput.value) || 1500;
  timer = setTimeout(() => {
    submit("×");
  }, ms);
}

function nextWord(){
  clearTimeout(timer);
  speechSynthesis.cancel();

  if(queue.length === 0){
    finishSession();
    return;
  }

  current = queue.pop();
  accepting = true;
  answered = false;
  showWord();
  readWord();
  startTimer();
}

function submit(mark){
  if(!running || !accepting || answered || !current) return;

  answered = true;
  accepting = false;
  clearTimeout(timer);

  results.push({
    en: current.en,
    ja: current.ja,
    result: mark
  });

  setTimeout(() => {
    nextWord();
  }, 180);
}

function handleAgain(){
  if(!running || !current) return;

  if(answered){
    nextWord();
    return;
  }

  clearTimeout(timer);
  readWord();
  startTimer();
}

function finishSession(){
  running = false;
  accepting = false;
  answered = true;
  clearTimeout(timer);
  speechSynthesis.cancel();
  endTime = new Date();

  const correct = results.filter(v => v.result === "○").length;
  const wrong = results.filter(v => v.result === "×").length;
  const acc = results.length ? Math.round(correct / results.length * 100) : 0;
  const wrongWords = results.filter(v => v.result === "×").map(v => `${v.en},${v.ja}`).join("\n");

  resultEl.value = [
    "英単語トレーナー 今回結果",
    `開始: ${formatDateTime(startTime)}`,
    `終了: ${formatDateTime(endTime)}`,
    `問題数: ${words.length}`,
    `回答数: ${results.length}`,
    `正解: ${correct}`,
    `不正解: ${wrong}`,
    `正答率: ${acc}%`,
    "",
    "ミス単語",
    wrongWords || "(なし)"
  ].join("\n");

  setup.style.display = "block";
}

function formatDateTime(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  const s = String(d.getSeconds()).padStart(2, "0");
  return `${y}-${m}-${day} ${h}:${mi}:${s}`;
}

startBtn.addEventListener("click", () => {
  unlockAudio();
  words = parseWords(importArea.value);
  if(!words.length){
    alert("単語がありません");
    return;
  }
  queue = shuffle(words);
  results = [];
  current = null;
  running = true;
  accepting = false;
  answered = false;
  startTime = new Date();
  endTime = null;
  setup.style.display = "none";
  nextWord();
});

closeSetupBtn.addEventListener("click", () => {
  setup.style.display = "none";
});

wrongBtn.addEventListener("click", () => submit("×"));
correctBtn.addEventListener("click", () => submit("○"));
againBtn.addEventListener("click", handleAgain);

document.addEventListener("touchstart", (e) => {
  if(e.touches.length === 2){
    setup.style.display = "block";
  }
}, { passive:true });

wordEl.textContent = "---";
</script>
</body>
</html>
