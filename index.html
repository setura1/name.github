<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>simple_touch_vocab_auto_flip.html</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  margin:0;width:100%;height:100%;
  background:#f5f7fb;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI",sans-serif;
}
body{overflow:hidden;}
#setup{position:fixed;inset:0;background:#f5f7fb;padding:12px;z-index:10;overflow:auto;}
#setupInner{max-width:900px;margin:0 auto;background:#fff;border:1px solid #d7deea;border-radius:16px;padding:12px;}
textarea,input,select,button{width:100%;font-size:16px;border-radius:12px;}
textarea,input,select{border:1px solid #d7deea;padding:12px;background:#fff;}
textarea{min-height:220px;resize:vertical;line-height:1.5;}
button{min-height:54px;border:1px solid #d7deea;background:#fff;font-weight:900;}
#startBtn{background:#2563eb;color:#fff;border-color:#2563eb;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.small{font-size:12px;color:#667085;margin:6px 0 4px;}

#app{width:100%;height:100%;display:flex;flex-direction:column;padding:max(10px, env(safe-area-inset-top)) 10px max(12px, env(safe-area-inset-bottom)) 10px;}

#topInfo{background:#fff;border:1px solid #d7deea;border-radius:16px;padding:10px;margin-bottom:10px;}
#progressText{text-align:center;font-weight:900;}
#progressBarWrap{margin-top:8px;height:10px;background:#e6edf8;border-radius:999px;overflow:hidden;}
#progressBar{height:100%;width:0%;background:#2563eb;}

#card{flex:1;background:transparent;perspective:1200px;}
#cardInner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:.5s;}
#card.flipped #cardInner{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;
  background:#fff;border:2px solid #d7deea;border-radius:24px;
  display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;
  backface-visibility:hidden;
}
#back{transform:rotateY(180deg);}
.word{font-size:34px;font-weight:900;word-break:break-word;}

#buttons{margin-top:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
button.big{min-height:78px;font-size:22px;border-radius:18px;}
#correctBtn{background:#2563eb;color:#fff;}

@media(max-width:480px){
  .word{font-size:28px;}
  #buttons{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="setup">
<div id="setupInner">
<div style="font-size:20px;font-weight:900;">英単語カード</div>

<div class="small">単語</div>
<textarea id="importArea">apple,りんご
engineer,技術者
design,設計</textarea>

<div class="small">制限(ms)</div>
<input id="answerLimit" type="number" value="1500">

<div class="small">英語速度</div>
<input id="rateEn" type="number" value="1.2" step="0.1">

<div class="small">日本語速度</div>
<input id="rateJa" type="number" value="1.1" step="0.1">

<div class="row">
<button id="startBtn">開始</button>
<button id="closeSetupBtn">閉じる</button>
</div>

</div>
</div>

<div id="app">
<div id="topInfo">
<div id="progressText">0 / 0</div>
<div id="progressBarWrap"><div id="progressBar"></div></div>
</div>

<div id="card">
<div id="cardInner">
<div class="face" id="front"><div class="word" id="enWord">---</div></div>
<div class="face" id="back"><div class="word" id="jaWord">---</div></div>
</div>
</div>

<div id="buttons">
<button class="big" id="wrongBtn">わからない</button>
<button class="big" id="nextBtn">つぎ</button>
<button class="big" id="correctBtn">わかる</button>
</div>
</div>

<script>
const importArea=document.getElementById("importArea");
const startBtn=document.getElementById("startBtn");
const setup=document.getElementById("setup");

const enWord=document.getElementById("enWord");
const jaWord=document.getElementById("jaWord");
const card=document.getElementById("card");

const wrongBtn=document.getElementById("wrongBtn");
const correctBtn=document.getElementById("correctBtn");
const nextBtn=document.getElementById("nextBtn");

const progressText=document.getElementById("progressText");
const progressBar=document.getElementById("progressBar");

let words=[],queue=[],current=null;
let index=0,total=0;
let timer=null;

function parse(){
  return importArea.value.split(/\n/).map(v=>{
    let [en,...ja]=v.split(",");
    return {en:en?.trim(),ja:ja.join(",").trim()};
  }).filter(v=>v.en&&v.ja);
}

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

function speak(text,lang,rate){
  let u=new SpeechSynthesisUtterance(text);
  u.lang=lang;
  u.rate=rate;
  speechSynthesis.speak(u);
  return u;
}

function next(){
  clearTimeout(timer);
  speechSynthesis.cancel();

  if(queue.length===0){setup.style.display="block";return;}

  current=queue.pop();
  index++;

  enWord.textContent=current.en;
  jaWord.textContent=current.ja;

  card.classList.remove("flipped");

  updateProgress();

  // 英語読み上げ → 終了後に裏面表示
  let u=speak(current.en,"en-US",Number(rateEn.value));
  u.onend=()=>{
    card.classList.add("flipped"); // ←ここが追加機能
    speak(current.ja,"ja-JP",Number(rateJa.value));
  };

  timer=setTimeout(()=>submit("×"),Number(answerLimit.value));
}

function submit(res){
  clearTimeout(timer);
  setTimeout(next,200);
}

function updateProgress(){
  progressText.textContent=`${index} / ${total}`;
  progressBar.style.width=(index/total*100)+"%";
}

startBtn.onclick=()=>{
  words=parse();
  if(!words.length)return;
  queue=shuffle(words);
  index=0;
  total=words.length;
  setup.style.display="none";
  next();
};

wrongBtn.onclick=()=>submit("×");
correctBtn.onclick=()=>submit("○");
nextBtn.onclick=()=>next();

document.addEventListener("touchstart",e=>{
  if(e.touches.length===2)setup.style.display="block";
},{passive:true});
</script>
</body>
</html>
